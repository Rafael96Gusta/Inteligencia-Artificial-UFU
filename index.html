<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReadWise AI</title>
  <link rel="icon" href="https://dados.ufu.br/sites/default/files/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">
      <img src="https://progep.ufu.br/sites/proreh.ufu.br/files/conteudo/capacitacao/1024px-ufu_logo.svg__0.png" alt="UFU" />
      <div class="brand">
        <h1>ReadWise AI</h1>
        <p class="subtitle">Inteligência Artificial para Estudos Acadêmicos</p>
      </div>
    </div>

    <div class="actions">
      <button
        class="theme-switcher-grid"
        id="theme-switcher-grid"
        type="button"
        aria-label="Alternar tema"
      >
        <div class="sun" id="sun" aria-hidden="true"></div>
        <div class="moon-overlay" id="moon-overlay" aria-hidden="true"></div>
        <div class="cloud-ball cloud-ball-left" id="ball1" aria-hidden="true"></div>
        <div class="cloud-ball cloud-ball-middle" id="ball2" aria-hidden="true"></div>
        <div class="cloud-ball cloud-ball-right" id="ball3" aria-hidden="true"></div>
        <div class="cloud-ball cloud-ball-top" id="ball4" aria-hidden="true"></div>
        <div class="star" id="star1" aria-hidden="true"></div>
        <div class="star" id="star2" aria-hidden="true"></div>
        <div class="star" id="star3" aria-hidden="true"></div>
        <div class="star" id="star4" aria-hidden="true"></div>
      </button>
      <button id="historyBtn" class="btn btn-ghost" type="button">Baixar histórico (PDF)</button>
      <div class="divider" aria-hidden="true"></div>
      <a class="btn btn-ghost" href="https://github.com/Rafael96Gusta" target="_blank" rel="noreferrer">GitHub</a>
      <a class="btn btn-ghost" href="https://www.linkedin.com/in/rafael-nogueira-3a164a34a" target="_blank" rel="noreferrer">LinkedIn</a>
    </div>
  </header>

  <div class="app">
    <aside class="sidebar">
      <section class="card">
        <h2>Downloads</h2>
        <p class="muted">Baixe o PDF do resumo.</p>
        <a class="btn btn-primary full" href="./resumo.pdf" download>Baixar resumo (PDF)</a>
        <p class="muted small">Coloque o arquivo <code>resumo.pdf</code> na raiz do projeto.</p>
      </section>
    </aside>

    <main class="main">
      <section class="chat-shell" aria-label="Chat">
        <div class="chat-header">
          <div>
            <h2>Assistente</h2>
            <p class="muted" id="chatStatus">Pronto para analisar textos e PDFs.</p>
          </div>
          <div class="chat-meta">
            <span class="pill" id="apiPill">Rafael96Gusta</span>
          </div>
        </div>

        <div id="chat" class="chat">
          <div id="messages"></div>
        </div>

        <footer class="composer">
          <div class="academic-area-box">
            <label for="academicArea">Área acadêmica</label>
            <input
              type="text"
              id="academicArea"
              name="academicArea"
              placeholder="ex.: Relações Internacionais, Direito, Medicina..."
              autocomplete="off"
            />
            <label class="exact-mode-toggle">
              <input type="checkbox" id="exactSciences" name="exactSciences" />
              <span>Modo exatas: gerar lista de exercícios (prioriza fórmulas e notação matemática quando o texto tiver)</span>
            </label>
          </div>
          <div class="input-container">
            <label class="file">
              <input type="file" id="fileInput" accept="application/pdf" />
              <span>PDF</span>
            </label>
            <input type="text" id="userInput" placeholder="Digite uma pergunta ou cole o tema do texto..." />
            <button id="sendBtn" class="btn btn-primary" type="button">Enviar</button>
          </div>
          <p class="muted small">Envie um texto ou um PDF para análise.</p>
        </footer>
      </section>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
