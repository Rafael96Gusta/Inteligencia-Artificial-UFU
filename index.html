<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReadWise AI — UFU</title>
  <link rel="icon" href="https://dados.ufu.br/sites/default/files/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="logo">
      <img src="https://progep.ufu.br/sites/proreh.ufu.br/files/conteudo/capacitacao/1024px-ufu_logo.svg__0.png" alt="UFU" />
      <h1>ReadWise AI — Inteligência Acadêmica</h1>
    </div>
    <div class="actions">
      <button id="historyBtn">Histórico</button>
      <a href="https://github.com/Rafael96Gusta" target="_blank">GitHub</a>
      <a href="https://www.linkedin.com/in/rafael-nogueira-3a164a34a" target="_blank">LinkedIn</a>
    </div>
  </header>

  <main id="chat">
    <div id="messages"></div>
  </main>

  <footer>
    <div class="input-container">
      <input type="file" id="fileInput" accept="application/pdf" />
      <input type="text" id="userInput" placeholder="Digite uma pergunta ou cole o tema do texto..." />
      <button id="sendBtn">Enviar</button>
    </div>
  </footer>

  <div id="historyModal" class="modal">
    <div class="modal-content">
      <h2>Histórico de conversas</h2>
      <div id="historyList"></div>
      <button id="clearHistory">Limpar histórico</button>
      <button id="closeHistory">Fechar</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
